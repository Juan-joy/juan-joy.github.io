<footer class="footer">
  <div class="container">
    <div class="footer__inner">
      <span>&copy; {{ now.Year }} {{ .Site.Params.fullName }}</span>
      <ul class="footer__links">
        {{ with .Site.Params.linkedin }}<li><a href="{{ . }}" target="_blank" rel="noopener">LinkedIn</a></li>{{ end }}
        {{ with .Site.Params.email }}<li><a href="mailto:{{ . }}">Email</a></li>{{ end }}
        {{ with .Site.Params.github }}<li><a href="{{ . }}" target="_blank" rel="noopener">GitHub</a></li>{{ end }}
      </ul>
    </div>
  </div>
</footer>
